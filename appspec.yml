version: 0.0
os: linux
files:
  - source: app.jar
    destination: /opt/myapp
    overwrite: true
  - source: deploy/myapp.service
    destination: /opt/myapp/deploy
    overwrite: true
  - source: scripts/
    destination: /opt/myapp/scripts
hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 300
      runas: root
  ApplicationStart:
    - location: scripts/start.sh
      timeout: 900
      runas: root
  ValidateService:
    - location: scripts/validate.sh
      timeout: 300
      runas: root

