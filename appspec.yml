hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      runas: root
      timeout: 300
  AfterInstall:
    - location: scripts/after_install.sh
      runas: root
      timeout: 300
  ApplicationStart:
    - location: scripts/start.sh
      runas: root
      timeout: 900     # ← 넉넉히 (15분)
  ApplicationStop:
    - location: scripts/stop.sh
      runas: root
      timeout: 300

