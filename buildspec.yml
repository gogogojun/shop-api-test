version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
  pre_build:
    commands:
      - chmod +x ./gradlew
  build:
    commands:
      - ./gradlew clean build -x test
      - echo "==== built jars ===="
      - ls -al build/libs || true
      # jar 선택 로직: 부트용 JAR 우선, 없으면 최신 JAR 1개 선택
      - |
        set -euo pipefail
        mkdir -p bundle/scripts bundle/deploy
        # 후보 목록 만들기 (부트용 jar 우선순위)
        mapfile -t JARS < <(ls -1t build/libs/*SNAPSHOT.jar build/libs/*.jar 2>/dev/null | grep -v '\-plain\.jar' || true)
        if ((${#JARS[@]} == 0)); then
          echo "ERROR: No jar found in build/libs"; exit 1
        fi
        SELECTED="${JARS[0]}"
        echo "Selected JAR: $SELECTED"
        cp "$SELECTED" bundle/app.jar
      # 나머지 배포 리소스 복사
      - cp -r appspec.yml bundle/
      - cp -r scripts/* bundle/scripts/ || true
      - cp -r deploy/*  bundle/deploy/  || true

artifacts:
  files:
    - bundle/**
  name: artifact-$(date +%Y%m%d%H%M%S)
