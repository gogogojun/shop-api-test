version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
  pre_build:
    commands:
      - chmod +x ./gradlew
  build:
    commands:
      - ./gradlew clean build -x test
      - echo "==== built jars ===="
      - ls -al build/libs || true
      # 실행용 JAR 1개만 선택 (plain 제외, 최신 우선)
      - |
        set -euo pipefail
        mapfile -t JARS < <(ls -1t build/libs/*SNAPSHOT.jar build/libs/*.jar 2>/dev/null | grep -v '\-plain\.jar' || true)
        if ((${#JARS[@]} == 0)); then
          echo "ERROR: No jar found in build/libs"; exit 1
        fi
        SELECTED="${JARS[0]}"
        echo "Selected JAR: $SELECTED"
        cp "$SELECTED" app.jar
      # 배포에 필요한 파일을 루트에 둔다 (중요!)
      - test -f appspec.yml || { echo "ERROR: appspec.yml not found at repo root"; exit 1; }
      - mkdir -p scripts deploy
      - ls -al scripts || true
      - ls -al deploy  || true
      - echo "==== artifact preview (root) ===="
      - find . -maxdepth 1 -type f -printf "%p\n" | sort

artifacts:
  files:
    - appspec.yml
    - app.jar
    - scripts/**/*
    - deploy/**/*
  name: artifact-$(date +%Y%m%d%H%M%S)

