version: 0.2

phases:
  install:
    commands:
      - echo "Using JDK 17 in CodeBuild image"
  pre_build:
    commands:
      - chmod +x ./gradlew
  build:
    commands:
      - ./gradlew clean build -x test
      - test -d build/libs || (echo "Build dir not found"; exit 1)
      - rm -rf bundle && mkdir -p bundle/deploy bundle/scripts
      - cp build/libs/*.jar bundle/app.jar
      - cp appspec.yml bundle/appspec.yml
      - cp -r scripts/* bundle/scripts/
      - cp deploy/myapp.service bundle/deploy/myapp.service
artifacts:
  files:
    - app.zip
  base-directory: bundle
  name: artifact-$(date +%Y%m%d%H%M%S)
  discard-paths: no
  secondary-artifacts:
    appbundle:
      files:
        - '**/*'
      base-directory: bundle
      name: appbundle-$(date +%Y%m%d%H%M%S)
