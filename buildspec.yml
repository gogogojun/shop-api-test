version: 0.2

phases:
  install:
    commands:
      - echo "[INSTALL] Java/Gradle ready"
  build:
    commands:
      - echo "[BUILD] Gradle build"
      - ./gradlew clean build -x test
      - echo "[PACKAGE] Collect artifacts"
      - rm -rf dist && mkdir -p dist/scripts dist/deploy
      # 빌드된 JAR을 단일 파일명 app.jar로 통일
      - cp build/libs/*.jar dist/app.jar
      # 배포 스크립트/유닛 파일/appspec 포함
      - cp -r scripts/* dist/scripts/ || true
      - cp deploy/myapp.service dist/deploy/
      - cp appspec.yml dist/

artifacts:
  base-directory: dist
  files:
    - app.jar
    - appspec.yml
    - scripts/**/*
    - deploy/**/*